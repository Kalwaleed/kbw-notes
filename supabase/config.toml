# Supabase Configuration
# See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true

[auth]
site_url = "https://kbw-notes.vercel.app"
additional_redirect_urls = ["http://localhost:5173/**", "https://kbw-notes.vercel.app/**"]

[auth.email]
enable_confirmations = true

[functions.moderate-comment]
# Allow anonymous access without JWT verification
verify_jwt = false

[functions.auto-sign-in]
# Legacy 410 Gone stub — must respond pre-auth
verify_jwt = false

[functions.request-magic-link]
# Pre-auth sign-in endpoint. Function does its own rate-limit + domain +
# invite-list gating; platform JWT check would block legitimate sign-ins.
verify_jwt = false

[functions.submit-reader-submission]
# Public submission intake. Anonymous by design; the function does its own
# origin/CSRF/rate-limit gating and uploads covers with the service role.
verify_jwt = false
